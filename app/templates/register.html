{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-header bg-success text-white text-center py-3">
                <h3 class="mb-0">
                    <i class="fas fa-user-plus me-2"></i>用户注册
                </h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-1"></i>用户名
                        </label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="请输入用户名（至少3位）" minlength="3" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1"></i>密码
                        </label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="请输入密码（至少6位）" minlength="6" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">
                            <i class="fas fa-check-circle me-1"></i>确认密码
                        </label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                               placeholder="请再次输入密码" minlength="6" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-user-check me-2"></i>注册并登录
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3">
                <small class="text-muted">
                    已有账号？
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                        <i class="fas fa-sign-in-alt me-1"></i>去登录
                    </a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
