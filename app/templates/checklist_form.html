{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-lg-8 offset-lg-2">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a href="{{ url_for('main.checklist_home') }}">
                        <i class="fas fa-clipboard-check me-1"></i>Checklist
                    </a>
                </li>
                <li class="breadcrumb-item active">{{ title }}</li>
            </ol>
        </nav>

        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white py-2">
                <h5 class="card-title mb-0">
                    <i class="fas fa-edit me-2"></i>{{ title }}
                </h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{% if item %}{{ url_for('main.checklist_edit', item_id=item.id) }}{% else %}{{ url_for('main.checklist_create') }}{% endif %}">
                    <div class="row mb-3">
                        <label class="col-sm-2 col-form-label">
                            <i class="fas fa-folder me-1"></i>分类 <span class="text-danger">*</span>
                        </label>
                        <div class="col-sm-10">
                            <select class="form-select" name="category_id" required>
                                <option value="">请选择分类</option>
                                {% for category in categories %}
                                <option value="{{ category.id }}" {% if item and item.category_id == category.id %}selected{% endif %}>
                                    {{ category.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-2 col-form-label">
                            <i class="fas fa-heading me-1"></i>内容 <span class="text-danger">*</span>
                        </label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" name="title" 
                                   value="{{ item.title if item else '' }}" placeholder="请输入内容标题" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-2 col-form-label">
                            <i class="fas fa-info-circle me-1"></i>详细描述
                        </label>
                        <div class="col-sm-10">
                            <textarea class="form-control" name="description" rows="2" 
                                      placeholder="简要描述此检查点的目的">{{ item.description if item else '' }}</textarea>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <label class="col-sm-2 col-form-label">
                            <i class="fas fa-book-open me-1"></i>详细内容
                        </label>
                        <div class="col-sm-10">
                            <textarea class="form-control" name="content" rows="10" 
                                      placeholder="输入详细的检查内容">{{ item.content if item else '' }}</textarea>
                            <small class="text-muted">支持纯文本格式，可使用换行和空格组织内容结构</small>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('main.checklist_home') }}" class="btn btn-sm btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>取消
                        </a>
                        <button type="submit" class="btn btn-sm btn-primary">
                            <i class="fas fa-save me-2"></i>{% if item %}保存修改{% else %}创建条目{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
