services:
  - type: web
    name: flask-me
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -c "import os; os.environ.setdefault('FLASK_ENV', 'production'); os.environ.setdefault('DATABASE_URL', 'sqlite:///site.db'); from run import app; from app import db; with app.app_context(): db.create_all(); print('Database initialized')" && gunicorn --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4 wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///site.db
      - key: FLASK_ENV
        value: production
