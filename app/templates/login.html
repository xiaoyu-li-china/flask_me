{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white text-center py-3">
                <h3 class="mb-0">
                    <i class="fas fa-sign-in-alt me-2"></i>用户登录
                </h3>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.login', next=request.args.get('next')) }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-1"></i>用户名
                        </label>
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="请输入用户名" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1"></i>密码
                        </label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="请输入密码" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>登录
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3">
                <p class="mb-2 text-muted">
                    <small>
                        <i class="fas fa-user me-1"></i>
                        默认账号: user / 密码: user123
                    </small>
                </p>
                <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary btn-sm">
                    <i class="fas fa-user-plus me-1"></i>没有账号？去注册
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
