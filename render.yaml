services:
  - type: web
    name: flask-me
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && chmod +x start.sh
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///site.db
      - key: FLASK_ENV
        value: production
