services:
  - type: web
    name: flask-me
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python init_db_script.py && gunicorn --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4 wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///site.db
      - key: FLASK_ENV
        value: production
